name: Tests

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Restore
        run: dotnet restore UCR.ECCI.PI.ThemePark.sln

      - name: Build Test Projects
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $projects = Get-ChildItem -Path . -Recurse -Filter *.csproj -File |
            Where-Object { $_.FullName -like '*Backend.*.Tests.Unit*' }
          if ($projects) {
            foreach ($proj in $projects) {
              Write-Host "Building test project $($proj.FullName)"
              dotnet build $proj.FullName -c Release --no-restore
            }
          }

      - name: Run Backend Unit Tests with Coverage
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path TestResults | Out-Null
          New-Item -ItemType Directory -Force -Path Coverage | Out-Null
          # Find Backend.*.Tests.Unit projects via wildcard match on full path
          $projects = Get-ChildItem -Path . -Recurse -Filter *.csproj -File |
            Where-Object { $_.FullName -like '*Backend.*.Tests.Unit*' }
          if (-not $projects) {
            Write-Host 'No Backend.*.Tests.Unit test projects found. Skipping tests.'
            exit 0
          }
          foreach ($proj in $projects) {
            $projName = $proj.BaseName
            $projResultsDir = Join-Path -Path "TestResults" -ChildPath $projName
            New-Item -ItemType Directory -Force -Path $projResultsDir | Out-Null
            Write-Host "Running tests for $($proj.FullName) with coverage into $projResultsDir"
            dotnet test $proj.FullName -c Release --logger "trx;LogFileName=$projName.trx" --results-directory $projResultsDir --collect "XPlat Code Coverage"
          }

      - name: Install ReportGenerator
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path .tools | Out-Null
          dotnet tool install --tool-path ./.tools dotnet-reportgenerator-globaltool

      - name: Generate Coverage Reports
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $coverageFiles = Get-ChildItem -Path TestResults -Recurse -Filter coverage.cobertura.xml -File -ErrorAction SilentlyContinue
          if (-not $coverageFiles) {
            Write-Host 'No coverage files found.'
            exit 0
          }
          $toolPath = Join-Path (Resolve-Path ".").Path ".tools/reportgenerator.exe"
          if (-not (Test-Path $toolPath)) {
            Write-Error "ReportGenerator not found at $toolPath"
            exit 1
          }
          foreach ($cov in $coverageFiles) {
            $projName = Split-Path -Path $cov.Directory.Parent.FullName -Leaf
            $targetDir = Join-Path -Path "Coverage" -ChildPath $projName
            New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
            & $toolPath -reports:$($cov.FullName) -targetdir:$targetDir -reporttypes:"Cobertura;JsonSummary"
          }

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: Coverage
